<div class="promo-banner" id="promo-banner" aria-label="Announcements">
    <div class="container promo-banner-inner">
        <div class="promo-banner-nav" aria-label="Announcement navigation">
            <button class="promo-banner-arrow" id="promo-prev" type="button" aria-label="Previous announcement">
                ‹
            </button>

            <div class="promo-banner-dots" id="promo-dots" aria-label="Select announcement"></div>

            <button class="promo-banner-arrow" id="promo-next" type="button" aria-label="Next announcement">
                ›
            </button>
        </div>

        <p class="promo-banner-text" id="promo-text"></p>

        <div class="promo-banner-actions" id="promo-actions"></div>
    </div>

    <button
            class="promo-banner-close"
            id="promo-banner-close"
            type="button"
            aria-label="Close announcement"
    >
        ×
    </button>
</div>
